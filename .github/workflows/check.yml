name: Check Remote Structure
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check structure
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q
          sshpass -e ssh -o StrictHostKeyChecking=no -p 65002 u502587017@191.101.230.15 "
            echo '=== HOME ===' && ls ~/
            echo '=== domains/erp ===' && ls ~/domains/erp.jbmpschool.in/
            echo '=== server.js? ===' && ls ~/domains/erp.jbmpschool.in/server.js 2>/dev/null || echo 'no server.js'
            echo '=== nodejs folder? ===' && ls ~/domains/erp.jbmpschool.in/nodejs 2>/dev/null || echo 'no nodejs subfolder'
            echo '=== public_html? ===' && ls ~/domains/erp.jbmpschool.in/public_html 2>/dev/null | head -5 || echo 'no public_html'
          "
