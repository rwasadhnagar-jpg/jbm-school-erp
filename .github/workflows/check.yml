name: Check Remote Structure
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app status
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass -q
          sshpass -e ssh -o StrictHostKeyChecking=no -p 65002 u502587017@191.101.230.15 "
            echo '=== node processes ===' && ps aux | grep node | grep -v grep
            echo '=== node_modules exists? ===' && ls ~/domains/erp.jbmpschool.in/node_modules | head -5 2>/dev/null || echo 'MISSING node_modules!'
            echo '=== .env exists? ===' && ls ~/domains/erp.jbmpschool.in/.env 2>/dev/null || echo 'MISSING .env!'
            echo '=== npm start ===' && cat ~/domains/erp.jbmpschool.in/package.json | grep -A2 scripts
          "
