name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp & sshpass
        run: sudo apt-get install -y lftp sshpass

      - name: Deploy via SFTP
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes;
            set sftp:connect-program 'sshpass -e ssh -o StrictHostKeyChecking=no';
            set net:max-retries 3;
            open sftp://u502587017@191.101.230.15:65002;
            user u502587017 $SSH_PASSWORD;
            mirror --reverse --delete --verbose \
              --exclude=^\.git \
              --exclude=^node_modules/ \
              --exclude=^\.env \
              --exclude=^backups/ \
              --exclude=.*\.log\$ \
              . /htdocs/erp.jbmpschool.in/;
            bye
          "
