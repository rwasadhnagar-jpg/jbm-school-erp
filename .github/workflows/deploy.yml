name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='backups/' \
            --exclude='*.log' \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            . u502587017@191.101.230.15:~/domains/erp.jbmpschool.in/

      - name: Create .env and restart app
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p 65002 u502587017@191.101.230.15 "
            cd ~/domains/erp.jbmpschool.in

            # Write .env with production values
            cat > .env << 'ENVEOF'
PORT=8080
DB_HOST=srv621.hstgr.io
DB_USER=u502587017_motivateducate
DB_PASSWORD=JBM@erp2026!
DB_NAME=u502587017_jbm
SESSION_SECRET=jbmerp_secret_2026
SCHOOL_NAME=JBM Public School
SCHOOL_CODE=JBMPS
ACADEMIC_YEAR=2026-2027
ENVEOF

            echo '.env written'

            # Install dependencies
            npm install --production --silent 2>/dev/null || true

            # Touch server.js to trigger app restart
            touch server.js

            echo 'Deployed OK'
          "
