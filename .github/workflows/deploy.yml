name: Deploy to Hostinger

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules/' \
            --exclude='.env' \
            --exclude='backups/' \
            --exclude='*.log' \
            -e "ssh -o StrictHostKeyChecking=no -p 65002" \
            . u502587017@191.101.230.15:~/domains/erp.jbmpschool.in/

      - name: Write .env and restart app
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -p 65002 u502587017@191.101.230.15 \
            "cd ~/domains/erp.jbmpschool.in && \
            printf 'PORT=8080\nDB_HOST=srv621.hstgr.io\nDB_USER=u502587017_motivateducate\nDB_PASSWORD=JBM@erp2026!\nDB_NAME=u502587017_jbm\nSESSION_SECRET=jbmerp_secret_2026\nSCHOOL_NAME=JBM Public School\nSCHOOL_CODE=JBMPS\nACADEMIC_YEAR=2026-2027\n' > .env && \
            npm install --production --silent 2>/dev/null || true && \
            touch server.js && \
            echo 'Deployed OK'"
